# Load variables from `.env` in this directory (Docker Compose also substitutes ${VAR} from `.env`).
# Ensure POSTGRES_* and DATABASE_URL stay in sync when you change the DB password.

version: '3.7'
services:
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - prisma-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 2s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      options:
        max-size: "10m"
        max-file: "3"
  api:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    networks:
      - prisma-network
    depends_on:
      postgres:
        condition: service_healthy
networks:
  prisma-network:
    driver: bridge
volumes:
  postgres_data:
